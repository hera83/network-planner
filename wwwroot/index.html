<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homelab Network Planner</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>Homelab Network Planner</h1>
        <p>Overblik over servere, IP-adresser og Proxmox VM IDs.</p>
      </div>
      <button id="refreshBtn" data-bs-toggle="tooltip" title="Opdater"></button>
    </header>

    <section class="panel">
      <h2>Anbefalet VM ID struktur</h2>
      <div class="vmid-grid" id="vmidGrid"></div>
    </section>

    <section class="panel">
      <h2>VM'er, LXC og workloads</h2>
      <div class="toolbar">
        <input id="searchInput" placeholder="Søg på navn, host, kategori eller IP..." />
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th data-sort="name" class="sortable">Navn <span class="sort-indicator"></span></th>
              <th data-sort="category" class="sortable">Kategori <span class="sort-indicator"></span></th>
              <th data-sort="hostServer" class="sortable">Host <span class="sort-indicator"></span></th>
              <th data-sort="vmId" class="sortable">VM ID <span class="sort-indicator"></span></th>
              <th data-sort="ipAddress" class="sortable">IP <span class="sort-indicator"></span></th>
              <th data-sort="operatingSystem" class="sortable">OS <span class="sort-indicator"></span></th>
              <th></th>
            </tr>
          </thead>
          <tbody id="workloadTable"></tbody>
        </table>
      </div>
      <form id="workloadForm" class="form-grid">
        <input type="hidden" id="workloadIdDb" />
        <h3 id="workloadFormTitle" style="grid-column: 1 / -1; margin: 0 0 0.5rem 0; font-size: 1rem; color: var(--text);">Opret ny workload</h3>
        <input id="workloadName" placeholder="Navn" required />
        <select id="workloadCategory" aria-label="Kategori" required>
          <option value="">Vælg kategori...</option>
          <option>Infrastructure</option>
          <option>Netværksservices</option>
          <option>Applikationer</option>
          <option>Databaser</option>
          <option>AI Services</option>
          <option>LXC / Utility</option>
          <option>Test / Lab</option>
        </select>
        <input id="workloadHostServer" placeholder="Host server" />
        <input id="workloadVmId" type="number" placeholder="VM ID" />
        <input id="workloadIpAddress" placeholder="IP-adresse" />
        <input id="workloadOs" placeholder="OS" />
        <input id="workloadDescription" placeholder="Beskrivelse" />
        <div class="actions-row">
          <button type="submit" class="form-submit-btn" data-bs-toggle="tooltip" title="Gem ny workload"><i class="bi bi-floppy-fill"></i> Gem ny</button>
          <button type="button" class="form-clear-btn" onclick="clearWorkloadForm()" data-bs-toggle="tooltip" title="Nulstil"><i class="bi bi-arrow-counterclockwise"></i></button>
        </div>
      </form>
    </section>

    <section class="panel">
      <h2>Fysiske servere og netværksudstyr</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Navn</th>
              <th>Rolle</th>
              <th>Placering</th>
              <th>Server IP</th>
              <th>iLO/IPMI</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="serverTable"></tbody>
        </table>
      </div>
      <form id="serverForm" class="form-grid">
        <input type="hidden" id="serverIdDb" />
        <h3 id="serverFormTitle" style="grid-column: 1 / -1; margin: 0 0 0.5rem 0; font-size: 1rem; color: var(--text);">Opret ny server</h3>
        <input id="serverName" placeholder="Navn" required />
        <input id="serverRole" placeholder="Rolle" required />
        <input id="serverLocation" placeholder="Placering" />
        <input id="serverNetworkIp" placeholder="Server IP" />
        <input id="serverIloIp" placeholder="iLO/IPMI IP" />
        <input id="serverNotes" placeholder="Noter" />
        <div class="actions-row">
          <button type="submit" class="form-submit-btn" data-bs-toggle="tooltip" title="Gem ny server"><i class="bi bi-floppy-fill"></i> Gem ny</button>
          <button type="button" class="form-clear-btn" onclick="clearServerForm()" data-bs-toggle="tooltip" title="Nulstil"><i class="bi bi-arrow-counterclockwise"></i></button>
        </div>
      </form>
    </section>

    <div id="toast" class="toast hidden"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
